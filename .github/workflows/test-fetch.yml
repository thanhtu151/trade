name: Datacenter Fetch Probe

# Manually triggered from the GitHub "Actions" tab.
# Answers the single most important deploy question:
#   "Are vnstock / Yahoo reachable from a GitHub datacenter IP, or blocked?"
# If this passes, the serverless (GitHub Actions cron) architecture is viable.
# If vnstock fails, we pivot to a VM (GCP e2-micro) near Vietnam.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # The whole reason this project misbehaves on cloud: it uses naive
      # datetime.now() for market-hours logic. Force Vietnam time here so the
      # probe's printed "local time" matches what the scheduler would see.
      TZ: Asia/Ho_Chi_Minh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal deps (probe only — no tensorflow)
        run: |
          python -m pip install --upgrade pip
          pip install "vnstock==4.0.4" "yfinance==1.4.1" "pandas==2.3.3" requests

      - name: Run connectivity probe
        run: python tools/test_datacenter_fetch.py
