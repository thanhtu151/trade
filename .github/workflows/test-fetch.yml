name: Datacenter Fetch Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Ho_Chi_Minh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal deps (probe only — no tensorflow)
        run: |
          python -m pip install --upgrade pip
          pip install "vnstock==4.0.4" "yfinance==1.4.1" "pandas==2.3.3" requests

      - name: Run connectivity probe
        run: python tools/test_datacenter_fetch.py
